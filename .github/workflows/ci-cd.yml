cd C:\Users\Lenovo\Desktop\01_store

# 完整的正确 YAML 内容
$correctYaml = @'
# ============================================
# GitHub Actions CI/CD 流水线配置
# ============================================
# 项目名称: Spring Boot Store Application
# 作者: 陆梦琳
# 日期: 2026-06-26
# 描述: 自动化构建、测试和部署 Spring Boot 应用
# ============================================

name: CI/CD Pipeline for Spring Boot Application

# ============================================
# 触发条件：仅在推送到 main 分支时触发
# ============================================
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ============================================
# 环境变量配置
# ============================================
env:
  JAVA_VERSION: '17'
  MYSQL_VERSION: '8.0'
  DOCKER_IMAGE_NAME: 'store-app'
  DOCKER_REGISTRY: 'docker.io'

# ============================================
# 工作流任务定义
# ============================================
jobs:
  
  # ==========================================
  # 阶段1：构建和测试 (Build & Test)
  # ==========================================
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL service to start..."
          sleep 10
          echo "MySQL should be ready now"
      
      - name: Build and Run Tests
        run: mvn clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/test_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root123
      
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/site/jacoco/
          retention-days: 30
      
      - name: Generate Surefire Report
        if: success()
        run: mvn surefire-report:report
      
      - name: Upload Surefire HTML Report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: target/site/surefire-report.html
          retention-days: 30
  
  # ==========================================
  # 阶段2：构建 Docker 镜像 (Docker Build)
  # ==========================================
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Extract Git Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=sha,prefix=v,format=long
            type=raw,value=latest
      
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      
      - name: Save Docker Image
        run: |
          docker save ${{ env.DOCKER_IMAGE_NAME }}:latest | gzip > docker-image.tar.gz
      
      - name: Upload Docker Image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: docker-image.tar.gz
          retention-days: 7
'@

# 使用 .NET 方法写入文件（无 BOM 的 UTF-8）
[System.IO.File]::WriteAllText(
    "$PWD\.github\workflows\ci-cd.yml",
    $correctYaml,
    (New-Object System.Text.UTF8Encoding $false)
)

Write-Host "[OK] ci-cd.yml 已用正确的语法重新创建" -ForegroundColor Green

# 验证文件
$lineCount = (Get-Content ".github\workflows\ci-cd.yml").Count
Write-Host "文件行数: $lineCount" -ForegroundColor Cyan

# 检查是否包含正确的表达式语法
$content = Get-Content ".github\workflows\ci-cd.yml" -Raw
if ($content -match '\$\{\{.*\}\}') {
    Write-Host "[OK] 包含正确的 GitHub Actions 表达式语法" -ForegroundColor Green
} else {
    Write-Host "[ERROR] 未找到正确的表达式语法" -ForegroundColor Red
}

# 提交并推送
git add .github/workflows/ci-cd.yml
git commit -m "fix: 修复所有 GitHub Actions 表达式语法错误"
git push origin main

Write-Host "`n[SUCCESS] 已推送修复后的配置" -ForegroundColor Green
Write-Host "请访问查看新的流水线运行状态:" -ForegroundColor Cyan
Write-Host "https://github.com/xiaolu304/cicd-test-demo/actions" -ForegroundColor Yellow